MEMORY {
	ZP: file = "", start = $0000, size = $0100, type = rw;
	RAM: file = "", start = $0100, size = $0700, type = rw;

	HEADER: file = %O, start = $0000, size = $0010, fill = yes;
	ROM0: file = %O, start = $C000, size = $3FFA, fill = yes;
	ROMV: file = %O, start = $FFFA, size = $0006, fill = yes;
	CHR: file = %O, start = $0000, size = $2000, fill = yes;
}
SEGMENTS {
	ZEROPAGE: load = ZP, type = zp;
	BSS: load = RAM, type = bss;
	HEADER: load = HEADER, type = ro;
	CODE: load = ROM0, type = ro, align = 64;
	VECTORS:  load = ROMV, type = ro;
	CHRDATA: load = CHR, type = ro;
}

